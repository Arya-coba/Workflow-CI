name: CI — Credit Card Fraud Detection

on:
  push:
    branches: [main]
    paths:
      - "MLProject/**"
  workflow_dispatch:   # Bisa trigger manual

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ──────────────────────────────────
      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Install dependencies ──────────────────────────
      - name: 📦 Install Dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn pandas numpy \
                      matplotlib imbalanced-learn dagshub

      # ── 4. Setup DagsHub credentials ─────────────────────
      - name: 🔑 Setup DagsHub Credentials
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN:    ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          pip install dagshub
          python -c "
          import dagshub
          dagshub.auth.add_app_token('${{ secrets.DAGSHUB_TOKEN }}')
          print('DagsHub credentials configured.')
          "

      # ── 5. Jalankan MLflow Project ───────────────────────
      - name: 🚀 Run MLflow Project (Training)
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN:    ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow run MLProject/ \
            --env-manager=local \
            -P n_estimators=100 \
            -P max_depth=10 \
            -P min_samples_split=5 \
            -P min_samples_leaf=1 \
            -P max_features=log2

      # ── 6. Upload model artifact ke GitHub ───────────────
      - name: 💾 Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: MLProject/artifacts/
          retention-days: 30

      # ── 7. Commit artifacts ke repository ────────────────
      - name: 📤 Commit Artifacts to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add MLProject/artifacts/ || true
          git diff --cached --quiet || git commit -m "chore: update trained model artifacts [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 8. Login ke Docker Hub ───────────────────────────
      - name: 🐳 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 9. Build Docker Image ────────────────────────────
      - name: 🔨 Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/creditcard-fraud-detection:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/creditcard-fraud-detection:${{ github.sha }} \
            MLProject/

      # ── 10. Push Docker Image ke Docker Hub ──────────────
      - name: 🚢 Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/creditcard-fraud-detection:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/creditcard-fraud-detection:${{ github.sha }}
          echo "✅ Image pushed: ${{ secrets.DOCKERHUB_USERNAME }}/creditcard-fraud-detection:latest"
